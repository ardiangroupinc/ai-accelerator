---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-operators

resources:
  - subscription.yaml
  # enable-console-plugin component excluded: IBM Cloud's managed Tekton
  # owns ConsolePlugin via TektonInstallerSet (controller: true ownerRef)
  # causing ArgoCD diff calculation failures. IBM handles console registration.

patches:
  - path: patch-channel.yaml
    target:
      group: operators.coreos.com
      kind: Subscription
      name: openshift-pipelines-operator
      namespace: openshift-operators
      version: v1alpha1

  - target:
      kind: Subscription
      name: openshift-pipelines-operator
    patch: |-
      - op: replace
        path: "/metadata/name"
        value: openshift-pipelines-operator-rh
