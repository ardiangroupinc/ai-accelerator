apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

resources:
  # operator overlay removed: IBM Cloud manages the rhods-operator subscription,
  # OperatorGroup, and namespace via the managed add-on. Manual Subscription is
  # blocked by ibm-operators-subscriptions-policy.
  - ../../../instance/overlays/rhoai-ibmcloud-lab
patches:
  - target:
      kind: DataScienceCluster
      name: default
    patch: |-
      - op: replace
        path: "/metadata/name"
        value: default-dsc
  - target:
      kind: DataScienceCluster
      name: default-dsc
    path: patch-datascience-cluster.yaml

