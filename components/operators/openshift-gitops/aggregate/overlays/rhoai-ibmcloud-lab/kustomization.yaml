apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../instance/overlays/rhoai-ibmcloud-lab
  - ../../../operator/overlays/latest

patches:
  - target:
      kind: Job
      name: job-gitops-console-plugin
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook
        value: PostSync
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook-delete-policy
        value: BeforeHookCreation
